schema: spec-driven

# Project context (optional)
# This is shown to AI when creating artifacts.
# Add your tech stack, conventions, style guides, domain knowledge, etc.
# Example:
#   context: |
#     Tech stack: TypeScript, React, Node.js
#     We use conventional commits
#     Domain: e-commerce platform

# Per-artifact rules (optional)
# Add custom rules for specific artifacts.
# Example:
#   rules:
#     proposal:
#       - Keep proposals under 500 words
#       - Always include a "Non-goals" section
#     tasks:
#       - Break tasks into chunks of max 2 hours

context: |
  Gere todos os artefatos em Português-BR.

  ========================
  PROJECT
  ========================

  Sistema web para chefs de cozinha gerenciarem receitas,
  gerar fichas técnicas automaticamente,
  criar menus com IA,
  e utilizar chat culinário assistido por LLM.

  ========================
  TECH STACK BACKEND
  ========================

  Python 3.11+
  FastAPI 0.104+
  Pydantic v2
  SQLModel 0.0.14+
  PostgreSQL 14+
  Alembic migrations

  Architecture:
  Clean Architecture
  Domain / Application / Infrastructure
  REST API
  OpenAPI auto generated

  ORM RULE:
  Use SQLModel only
  Pydantic must match SQLModel
  No duplicated schemas

  ========================
  TECH STACK FRONTEND
  ========================

  Next.js 14+
  TypeScript
  App Router
  TailwindCSS
  shadcn/ui
  TanStack Query

  Rules Frontend:

  Do not use any
  Types must come from OpenAPI
  Use Server Components by default

  ========================
  IA / LLM
  ========================

  Google Gemini API

  Rules LLM:

  Must return JSON
  Must follow specs
  Must not invent fields
  Must respect schema

  ========================
  DATABASE
  ========================

  PostgreSQL only
  UUID primary keys
  Migrations required

  ========================
  DOCKER
  ========================

  Docker required
  docker-compose for dev
  .env required

  ========================
  SECURITY
  ========================

  JWT auth
  No CORS "*"
  HTTPS in production


rules:

  proposal: |
    - Toda proposta deve conter objetivo, escopo e requisitos.
    - Deve conter requisitos funcionais (RF).
    - Deve conter requisitos não funcionais (RNF).

  specs: |
    - Use formato Given/When/Then.
    - Deve definir comportamento da API.
    - Deve definir erros.
    - Deve definir formato de resposta.

  design: |
    Backend:
    - Definir modelos SQLModel
    - Definir schemas Pydantic
    - Definir endpoints FastAPI
    - Garantir type-safety

    Frontend:
    - Definir componentes shadcn/ui
    - Definir tipos TypeScript
    - Definir integração com API

    Infra:
    - Definir Docker
    - Definir variáveis de ambiente

  tasks: |
    - Tasks devem ter critérios de aceitação.
    - Tasks devem ser testáveis.
    - Tasks devem ser incrementais.
